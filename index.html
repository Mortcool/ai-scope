<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta
      name="description"
      content="AIScope · AI 瞭望，全球 AI 资讯中文聚合阅读站。"
    />
    <title>AIScope · AI 瞭望</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#stories">跳到资讯列表</a>

    <header class="site-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M12 3v4m0 10v4M3 12h4m10 0h4M5.6 5.6l2.8 2.8m7.2 7.2 2.8 2.8m0-12.8-2.8 2.8m-7.2 7.2-2.8 2.8" />
            <circle cx="12" cy="12" r="4" />
          </svg>
        </div>
        <div>
          <p class="eyebrow">AIScope</p>
          <h1>AI 瞭望</h1>
        </div>
      </div>

      <button class="refresh-button" id="refreshButton" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 11a8 8 0 0 0-14.6-4.5L4 8m0 0V3m0 5h5M4 13a8 8 0 0 0 14.6 4.5L20 16m0 0v5m0-5h-5" />
        </svg>
        <span>刷新</span>
      </button>
    </header>

    <main>
      <section class="feed-bar" aria-label="资讯状态">
        <p class="status-line" id="statusLine">正在连接全球 AI 资讯源</p>
        <aside class="signal-panel" aria-label="资讯状态">
          <div>
            <span class="metric" id="itemCount">0</span>
            <span class="metric-label">条资讯</span>
          </div>
          <div>
            <span class="metric" id="sourceCount">0/0</span>
            <span class="metric-label">来源在线</span>
          </div>
          <div>
            <span class="metric" id="updatedAt">--:--</span>
            <span class="metric-label">更新时间</span>
          </div>
        </aside>
      </section>

      <section class="top-grid" id="topStories" aria-label="重点资讯"></section>

      <section class="story-grid" id="stories" aria-label="资讯列表"></section>

      <section class="filters" aria-label="筛选资讯">
        <div>
          <p class="filter-label">来源</p>
          <div class="chip-row" id="sourceFilters"></div>
        </div>
        <div>
          <p class="filter-label">主题</p>
          <div class="chip-row" id="topicFilters"></div>
        </div>
      </section>

      <section class="notice is-hidden" id="notice" role="status"></section>
    </main>

    <template id="loadingTemplate">
      <article class="skeleton-card"></article>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
